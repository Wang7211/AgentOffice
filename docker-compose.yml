services:
  mysql:
    image: mysql:8.0
    container_name: agent-office-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: agentoffice_root
      MYSQL_DATABASE: agentoffice
      MYSQL_USER: agentoffice
      MYSQL_PASSWORD: agentoffice123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uagentoffice",
          "-pagentoffice123",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  agent-office:
    build: ./backend
    container_name: agent-office
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://agentoffice:agentoffice123@mysql:3306/agentoffice?charset=utf8mb4
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
